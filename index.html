<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>参道 — 巡礼の同行</title>
<meta name="description" content="四国八十八ヶ所をはじめ、各地の霊場巡礼を記録する同行アプリ。端末内完結。" />
<meta name="theme-color" content="#0f0f0f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="参道" />
<link rel="manifest" href="./manifest.json" />
<meta property="og:title" content="参道 — 四国八十八ヶ所" />
<meta property="og:description" content="四国八十八ヶ所を巡る物理巡礼の同行アプリ。連続記録なし。参拝を静かに記録する。" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sando.xdcyw.net" />
<meta property="og:image" content="https://sando.xdcyw.net/icons/icon-512.png" />
<meta name="twitter:card" content="summary" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<style>
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0f0f0f;
  --surface:   #191917;
  --surface2:  #211f1c;
  --border:    #2e2b26;
  --text:      #e8e4dc;
  --text2:     #8a8278;
  --text3:     #50493f;
  --gold:      #c4974a;
  --gold-soft: rgba(196,151,74,0.13);
  --gold-dim:  rgba(196,151,74,0.32);
  --red-dim:   rgba(192,80,80,0.25);
}
html { background: var(--bg); color: var(--text); font-family: -apple-system, "Helvetica Neue", "Noto Sans JP", sans-serif; -webkit-font-smoothing: antialiased; min-height: 100dvh; font-size: 16px; line-height: 1.7; }
body { padding-top: calc(env(safe-area-inset-top,0px) + 56px); padding-bottom: calc(env(safe-area-inset-bottom,0px) + 64px); }
#app { max-width: 480px; margin: 0 auto; }

/* ── Topbar ── */
.topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: calc(env(safe-area-inset-top,0px) + 10px) 16px 10px; min-height: calc(env(safe-area-inset-top,0px) + 56px); gap: 8px; }
.topbar-logo { font-size: 17px; font-weight: 900; letter-spacing: 0.1em; color: var(--gold); font-family: "Noto Serif JP", "Yu Mincho", serif; flex-shrink: 0; }
.topbar-route { flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background 0.15s; border: none; background: none; color: var(--text2); font-size: 12px; font-family: inherit; }
.topbar-route:hover { background: var(--surface); }
.topbar-route-name { font-weight: 700; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.topbar-sub { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.top-btn { background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 4px; font-family: inherit; line-height: 1; flex-shrink: 0; }

/* ── Bottom nav ── */
.bottomnav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--bg); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom,0px); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 10px 0; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; transition: color 0.15s; font-family: inherit; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--gold); }

/* ── Screen ── */
.screen { padding: 16px; }

/* ── Dojo section ── */
.dojo-section { margin-bottom: 26px; }
.dojo-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
.dojo-name { font-size: 17px; font-weight: 900; letter-spacing: 0.06em; color: var(--gold); font-family: "Noto Serif JP", "Yu Mincho", serif; }
.dojo-kana { font-size: 11px; color: var(--text3); }
.dojo-pref { font-size: 11px; color: var(--text3); margin-left: auto; }
.dojo-bar { height: 2px; background: var(--border); border-radius: 1px; margin-bottom: 12px; overflow: hidden; }
.dojo-bar-fill { height: 100%; background: var(--gold); border-radius: 1px; transition: width 0.4s ease; }

/* ── Temple row ── */
.temple-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
.temple-row:last-child { border-bottom: none; }
.temple-row:active { opacity: 0.65; }
.temple-num { font-size: 13px; color: var(--text3); min-width: 26px; font-variant-numeric: tabular-nums; text-align: right; }
.temple-mark { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: 900; color: transparent; transition: background 0.3s, border-color 0.3s, color 0.3s; font-family: "Noto Serif JP", "Yu Mincho", serif; }
.temple-mark.v { background: var(--gold); border-color: var(--gold); color: #0f0f0f; }
.temple-name { flex: 1; font-size: 15px; font-weight: 700; }
.temple-name.empty { color: var(--text3); font-weight: 600; font-style: italic; font-size: 13px; }
.temple-arrow { color: var(--text3); font-size: 14px; }

/* ── Temple detail ── */
.detail-hero { text-align: center; padding: 28px 0 20px; }
.detail-num { font-size: 13px; color: var(--text3); letter-spacing: 0.06em; }
.detail-name { font-size: 24px; font-weight: 900; margin-top: 6px; letter-spacing: 0.04em; font-family: "Noto Serif JP", "Yu Mincho", serif; }
.detail-name.empty { color: var(--text3); font-size: 16px; font-style: italic; }
.detail-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--gold-soft); border: 1px solid var(--gold-dim); border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--gold); margin-top: 10px; }
.detail-stamp { width: 68px; height: 68px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; color: #0f0f0f; margin: 18px auto 6px; font-family: "Noto Serif JP", "Yu Mincho", serif; }
.visit-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-top: 14px; }
.visit-date { font-size: 12px; color: var(--text2); }
.visit-note { font-size: 14px; margin-top: 6px; }

/* ── Breathe ── */
.breathe-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60dvh; text-align: center; }
.breathe-msg { font-size: 15px; color: var(--text2); margin-bottom: 40px; line-height: 2.1; }
.breathe-ring { width: 110px; height: 110px; border-radius: 50%; border: 1.5px solid var(--gold-dim); display: flex; align-items: center; justify-content: center; margin-bottom: 40px; animation: breathe 4.5s ease-in-out infinite; }
@keyframes breathe {
  0%,100% { transform: scale(1); border-color: var(--gold-dim); }
  50%      { transform: scale(1.1); border-color: var(--gold); }
}
.breathe-dot { width: 36px; height: 36px; border-radius: 50%; background: var(--gold-soft); border: 1px solid var(--gold-dim); }

/* ── Note ── */
.note-msg { font-size: 15px; color: var(--text2); text-align: center; margin-bottom: 18px; line-height: 2.0; }
.note-field { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 15px; padding: 14px; outline: none; font-family: inherit; resize: none; height: 120px; line-height: 1.7; }
.note-field:focus { border-color: var(--gold-dim); }
.note-char { text-align: right; font-size: 11px; color: var(--text3); margin-top: 5px; }

/* ── 納経帳 ── */
.kecho-msg { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 18px; line-height: 1.9; }
.kecho-sec { margin-bottom: 22px; }
.kecho-sec-name { font-size: 12px; font-weight: 700; color: var(--text3); letter-spacing: 0.07em; margin-bottom: 9px; }
.kecho-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.kecho-cell { aspect-ratio: 1; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: var(--text3); cursor: pointer; transition: background 0.25s, border-color 0.25s, color 0.25s; position: relative; }
.kecho-cell:active { opacity: 0.65; }
.kecho-cell.v { background: var(--gold); border-color: var(--gold); color: #0f0f0f; font-family: "Noto Serif JP", "Yu Mincho", serif; font-size: 12px; }
.kecho-num { font-size: 8px; position: absolute; top: 3px; left: 0; right: 0; text-align: center; opacity: 0.55; }
.kecho-cell.v .kecho-num { display: none; }
.kecho-total { text-align: center; font-size: 12px; color: var(--text3); margin-top: 8px; }

/* ── 結願 ── */
.kechigan { text-align: center; padding: 28px 16px; border: 1px solid var(--gold-dim); border-radius: 16px; margin-bottom: 20px; }
.kechigan-kanji { font-size: 36px; font-weight: 900; color: var(--gold); font-family: "Noto Serif JP", "Yu Mincho", serif; }
.kechigan-title { font-size: 18px; font-weight: 800; margin-top: 10px; letter-spacing: 0.05em; font-family: "Noto Serif JP", "Yu Mincho", serif; }
.kechigan-desc { font-size: 13px; color: var(--text2); margin-top: 12px; line-height: 1.9; }

/* ── 霊場管理 ── */
.route-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 10px; }
.route-card.active-route { border-color: var(--gold-dim); background: var(--gold-soft); }
.route-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.route-card-name { font-size: 16px; font-weight: 800; }
.route-card-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
.route-badge { font-size: 11px; font-weight: 700; color: var(--gold); background: var(--gold-soft); border: 1px solid var(--gold-dim); border-radius: 6px; padding: 2px 8px; white-space: nowrap; flex-shrink: 0; }
.route-progress { height: 2px; background: var(--border); border-radius: 1px; margin: 12px 0; overflow: hidden; }
.route-progress-fill { height: 100%; background: var(--gold); border-radius: 1px; }
.route-card-actions { display: flex; gap: 8px; margin-top: 12px; }

/* ── 霊場追加フォーム ── */
.add-route-tip { font-size: 13px; color: var(--text2); line-height: 1.9; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }

/* ── Buttons ── */
.btn { display: flex; align-items: center; justify-content: center; width: 100%; border: none; border-radius: 13px; padding: 13px; font-size: 15px; font-weight: 800; cursor: pointer; transition: opacity 0.15s, transform 0.1s; font-family: inherit; letter-spacing: 0.02em; }
.btn:active { opacity: 0.8; transform: scale(0.98); }
.btn-primary { background: var(--gold); color: #0f0f0f; }
.btn-ghost   { background: transparent; color: var(--text2); border: 1px solid var(--border); font-weight: 600; }
.btn-danger  { background: transparent; color: #c05050; border: 1px solid var(--red-dim); font-weight: 600; }
.btn-sm      { font-size: 13px; padding: 9px 14px; border-radius: 10px; width: auto; }

/* ── Form ── */
.form-lbl { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; display: block; margin-bottom: 7px; }
.form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-size: 16px; padding: 12px 14px; outline: none; font-family: inherit; transition: border-color 0.15s; }
.form-input:focus { border-color: var(--gold-dim); }
.form-input.err { border-color: #c05050; }
.form-row { margin-bottom: 18px; }
.form-hint { font-size: 12px; color: var(--text3); margin-top: 5px; }

/* ── ことわり ── */
.disclaimer { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; font-size: 13px; color: var(--text2); line-height: 2.0; }
.disclaimer h3 { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 10px; }

/* ── Misc ── */
.sec-lbl { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.07em; margin: 22px 0 10px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.terms-hero { text-align: center; padding: 40px 0 26px; }
.terms-logo { font-size: 34px; font-weight: 900; letter-spacing: 0.12em; color: var(--gold); font-family: "Noto Serif JP", "Yu Mincho", serif; }
.terms-tag  { font-size: 13px; color: var(--text3); margin-top: 8px; }
.row-btns { display: flex; flex-direction: column; gap: 10px; }
button:focus-visible, a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

/* ─────────────────────────────────────
   四国八十八ヶ所 組み込みデータ
   出典：四国八十八ヶ所霊場会公式情報に基づく
   HONZON は人間が公式情報から確認・追記すること
   ───────────────────────────────────── */
const S88_NAMES = {
   1:'霊山寺',   2:'極楽寺',   3:'金泉寺',   4:'大日寺',   5:'地蔵寺',
   6:'安楽寺',   7:'十楽寺',   8:'熊谷寺',   9:'法輪寺',  10:'切幡寺',
  11:'藤井寺',  12:'焼山寺',  13:'大日寺',  14:'常楽寺',  15:'国分寺',
  16:'観音寺',  17:'井戸寺',  18:'恩山寺',  19:'立江寺',  20:'鶴林寺',
  21:'太龍寺',  22:'平等寺',  23:'薬王寺',  24:'最御崎寺', 25:'津照寺',
  26:'金剛頂寺', 27:'神峯寺',  28:'大日寺',  29:'国分寺',  30:'善楽寺',
  31:'竹林寺',  32:'禅師峰寺', 33:'雪蹊寺',  34:'種間寺',  35:'清滝寺',
  36:'青龍寺',  37:'岩本寺',  38:'金剛福寺', 39:'延光寺',  40:'観自在寺',
  41:'龍光寺',  42:'仏木寺',  43:'明石寺',  44:'大寶寺',  45:'岩屋寺',
  46:'浄瑠璃寺', 47:'八坂寺',  48:'西林寺',  49:'浄土寺',  50:'繁多寺',
  51:'石手寺',  52:'太山寺',  53:'圓明寺',  54:'延命寺',  55:'南光坊',
  56:'泰山寺',  57:'栄福寺',  58:'仙遊寺',  59:'国分寺',  60:'横峰寺',
  61:'香園寺',  62:'宝寿寺',  63:'吉祥寺',  64:'前神寺',  65:'三角寺',
  66:'雲辺寺',  67:'大興寺',  68:'神恵院',  69:'観音寺',  70:'本山寺',
  71:'弥谷寺',  72:'曼荼羅寺', 73:'出釈迦寺', 74:'甲山寺',  75:'善通寺',
  76:'金倉寺',  77:'道隆寺',  78:'郷照寺',  79:'天皇寺',  80:'国分寺',
  81:'白峯寺',  82:'根香寺',  83:'一宮寺',  84:'屋島寺',  85:'八栗寺',
  86:'志度寺',  87:'長尾寺',  88:'大窪寺',
};
const S88_HONZON = { /* 人間が公式情報から確認・追記してください */ };
const S88_DOJOS = [
  { name:'発心', kana:'ほっしん',  pref:'阿波・徳島', start:1,  end:23 },
  { name:'修行', kana:'しゅぎょう', pref:'土佐・高知', start:24, end:39 },
  { name:'菩提', kana:'ぼだい',   pref:'伊予・愛媛', start:40, end:65 },
  { name:'涅槃', kana:'ねはん',   pref:'讃岐・香川', start:66, end:88 },
];

/* 組み込み霊場の静的設定 */
const BUILTIN = {
  shikoku88: {
    id: 'shikoku88',
    name: '四国八十八ヶ所',
    short: '四国',
    count: 88,
    dojos: S88_DOJOS,
    names: S88_NAMES,
    honzon: S88_HONZON,
    kechigan: {
      title: '結願',
      desc: 'お礼参りとして、高野山奥の院（和歌山県高野町）へのお参りが伝統とされています。弘法大師空海が今もご入定されているとされる聖地です。四国霊場会の公式案内をご参照ください。',
    },
  },
};

/* ── State ── */
const STORAGE = 'sando_v1';
const TERMS_VER = 1;

/* デフォルト */
let state = {
  termsVer: 0,
  activeRoute: 'shikoku88',
  routes: {
    shikoku88: { visits: {} },
  },
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE);
    if (!raw) return;
    const saved = JSON.parse(raw);
    /* v1→v2 マイグレーション: visits が routes の外にあった旧形式 */
    if (saved.visits && !saved.routes) {
      saved.routes = { shikoku88: { visits: saved.visits } };
      delete saved.visits;
    }
    state = { ...state, ...saved };
    /* 組み込み霊場の visits キーを補完 */
    if (!state.routes.shikoku88) state.routes.shikoku88 = { visits: {} };
  } catch {}
}

function saveState() {
  try { localStorage.setItem(STORAGE, JSON.stringify(state)); } catch {}
}

/* ── Route helpers ── */
function getRouteConfig(id) {
  if (BUILTIN[id]) return BUILTIN[id];
  const r = state.routes[id];
  return r ? { id, name: r.name, short: r.short || r.name, count: r.count, dojos: [], names: r.names || {}, honzon: {}, kechigan: null } : null;
}

function activeConfig() { return getRouteConfig(state.activeRoute); }
function activeVisits() { return state.routes[state.activeRoute]?.visits || {}; }
function isVisited(n) { return !!activeVisits()[n]; }
function countVisited() { return Object.keys(activeVisits()).length; }
function maxCount() { return activeConfig()?.count || 88; }

function dojoOf(cfg, n) {
  if (!cfg?.dojos?.length) return null;
  return cfg.dojos.find(d => n >= d.start && n <= d.end) || null;
}

function templName(cfg, n) {
  return cfg?.names?.[n] || null;
}

function recordVisit(n, note) {
  if (!state.routes[state.activeRoute]) return;
  state.routes[state.activeRoute].visits[n] = { date: new Date().toISOString().slice(0,10), note: note || '' };
  saveState();
}
function removeVisit(n) {
  if (!state.routes[state.activeRoute]) return;
  delete state.routes[state.activeRoute].visits[n];
  saveState();
}

function addCustomRoute(name, count) {
  const id = 'r_' + Date.now().toString(36);
  state.routes[id] = { name, short: name.slice(0,6), count: Number(count), names: {}, visits: {} };
  saveState();
  return id;
}

function deleteRoute(id) {
  if (BUILTIN[id]) return; /* 組み込みは削除不可 */
  delete state.routes[id];
  if (state.activeRoute === id) state.activeRoute = 'shikoku88';
  saveState();
}

function switchRoute(id) {
  if (!state.routes[id]) return;
  state.activeRoute = id;
  saveState();
}

/* ── Helpers ── */
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function uid() { return 'r_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

/* ── Navigation ── */
let view = { tab: 'list', screen: 'list', templeN: null };

function go(screen, opts) {
  view = { ...view, screen, ...(opts || {}) };
  render();
}
function goTab(tab) {
  view = { tab, screen: tab, templeN: null };
  render();
}

/* ── Render ── */
function render() {
  const app = document.getElementById('app');
  if (state.termsVer < TERMS_VER) { app.innerHTML = screenTerms(); return; }
  switch (view.screen) {
    case 'list':     app.innerHTML = screenList(); break;
    case 'stamp':    app.innerHTML = screenStamp(); break;
    case 'disc':     app.innerHTML = screenDisc(); break;
    case 'routes':   app.innerHTML = screenRoutes(); break;
    case 'addRoute': app.innerHTML = screenAddRoute(); break;
    case 'temple':   app.innerHTML = screenTemple(view.templeN); break;
    case 'breathe':  app.innerHTML = screenBreathe(view.templeN); break;
    case 'note':     app.innerHTML = screenNote(view.templeN); break;
    case 'done':     app.innerHTML = screenDone(view.templeN); break;
    default:         app.innerHTML = screenList();
  }
}

/* ── Nav ── */
function navHTML(tab) {
  const t = tab || view.tab;
  return `
    <nav class="bottomnav">

function exportBackup() {
  try {
    var data = {};
    for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); data[k] = localStorage.getItem(k); }
    var payload = { app: 'sando', type: 'backup', exportedAt: new Date().toISOString(), data: data };
    var blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var dt = new Date(); var stamp = '' + dt.getFullYear() + String(dt.getMonth()+1).padStart(2,'0') + String(dt.getDate()).padStart(2,'0');
    var a = document.createElement('a'); a.href = url; a.download = 'sando-backup-' + stamp + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
    alert('バックアップを書き出しました。');
  } catch (e) { alert('書き出しに失敗しました。'); }
}
function onBackupFilePick(ev) {
  var file = (ev.target.files || [])[0]; ev.target.value = ''; if (!file) return;
  var reader = new FileReader();
  reader.onload = function() {
    var payload; try { payload = JSON.parse(reader.result); } catch (e) { alert('このファイルは読み込めませんでした。'); return; }
    if (!payload || payload.app !== 'sando' || !payload.data) { alert('参道のバックアップファイルではありません。'); return; }
    if (!confirm('バックアップから復元します。今の記録はファイルの内容に置きかわります。続けますか？')) return;
    try { Object.keys(payload.data).forEach(function(k){ localStorage.setItem(k, payload.data[k]); }); }
    catch (e) { alert('復元に失敗しました。'); return; }
    location.reload();
  };
  reader.onerror = function() { alert('読み込みに失敗しました。'); };
  reader.readAsText(file);
}

/* ── PWA ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

/* ── Boot ── */
loadState();
render();
</script>
